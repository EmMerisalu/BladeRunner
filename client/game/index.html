<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>BladeRunner</title>
  <style>
    body { margin: 0; background: #111; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
    #lobby { text-align: center; }
    input, button { padding: 8px 16px; margin: 6px; font-size: 16px; }
    #playerList { margin: 16px 0; min-height: 80px; }
    .player-entry { margin: 4px 0; }
    #error { color: tomato; min-height: 20px; }
    #game { display: none; position: fixed; inset: 0; }
  </style>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div id="game">
  <div id="ui">
    <div id="timer">Time: 0.0</div>
  </div>
  <div id="gameArea">
    <div id="trackLines"></div>
  </div>
</div>

<script src="game.js"></script>
<script>
  // Always create a fresh WebSocket on page load
  const protocol = location.protocol === "https:" ? "wss:" : "ws:";
  // include the current query string so lobby id (if present) is forwarded
  ws = new WebSocket(`${protocol}//${location.host}${location.search}`);

  ws.onopen = () => {
    console.log("Connected to server");
    // If we came from the menu, the username may be in sessionStorage — send it automatically
    const stored = sessionStorage.getItem('playerName');
    if (stored) {
      ws.send(JSON.stringify({ type: 'setName', name: stored }));
    }
    // show waiting status until server starts the game
    document.getElementById('timer').textContent = 'Waiting for host...';
  };

  ws.onclose = () => {
    document.getElementById("status").textContent = "Disconnected from server. Please refresh.";
  };

  ws.onmessage = (event) => {
    const msg = JSON.parse(event.data);

    // pass messages to shared handler
    handleServerMessage(msg);

    if (msg.type === 'rejected') {
      // show reason on timer area
      document.getElementById('timer').textContent = msg.reason || 'Rejected';
      return;
    }

    if (msg.type === 'started') {
      // server indicates game loop started — initialize the game view
      document.getElementById('game').style.display = 'block';
      initGame();
    }
  };

  document.getElementById("setNameBtn").onclick = () => {
    const name = document.getElementById("nameInput").value.trim();
    if (!name) return;
    document.getElementById("error").textContent = "";
    ws.send(JSON.stringify({ type: "setName", name }));
    document.getElementById("readyBtn").disabled = false;
  };

  document.getElementById("readyBtn").onclick = () => {
    ws.send(JSON.stringify({ type: "ready" }));
  };

  document.getElementById("startBtn").onclick = () => {
    ws.send(JSON.stringify({ type: "startGame" }));
  };
</script>
</body>
</html>
