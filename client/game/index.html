<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>BladeRunner</title>
  <style>
    body { margin: 0; background: #111; color: white; font-family: sans-serif; }
    #game { display: none; position: fixed; inset: 0; }
  </style>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div id="game">
  <div id="ui">
    <div id="timer">Time: 0.0</div>
  </div>
  <div id="gameArea">
    <div id="trackLines"></div>
  </div>
</div>

<script src="game.js"></script>
<script>
  const protocol = location.protocol === "https:" ? "wss:" : "ws:";
  ws = new WebSocket(`${protocol}//${location.host}${location.search}`);

  ws.onopen = () => {
    console.log("Connected to server");
    document.getElementById('timer').textContent = 'Connecting...';
  };

  ws.onclose = () => {
    document.getElementById('timer').textContent = "Disconnected. Please refresh.";
  };

  ws.onmessage = (event) => {
    const msg = JSON.parse(event.data);
    handleServerMessage(msg);

    if (msg.type === 'rejected') {
      document.getElementById('timer').textContent = msg.reason || 'Rejected';
      return;
    }

    if (msg.type === 'started') {
      document.getElementById('game').style.display = 'block';
      initGame();
    }
  };
</script>
</body>
</html>
