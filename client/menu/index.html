<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>Menu</title>
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<div class="wrap">
		<div class="card">
			<h1>Enter your username</h1>
			<label for="username">Username (required)</label>
			<input id="username" type="text" placeholder="Type something" autocomplete="off" />

			<div class="buttons">
				<button id="createBtn" class="create" disabled>Create Lobby</button>
				<button id="joinBtn" class="join" disabled>Join Lobby</button>
			</div>

			<div class="note">Username must be non-empty. Buttons enabled when valid.</div>
		</div>
	</div>

	<script src="script.js">
		
	</script>
</body>
</html>
