<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Lobby</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="box">
    <h1>Lobby</h1>
    <div class="meta">Lobby ID: <span id="lobbyId">-</span> <button id="copyId">Copy</button></div>

    <div id="players"></div>

    <div class="controls">
      <button id="readyBtn" disabled>Ready</button>
      <button id="startBtn" style="display:none">Play</button>
    </div>

    <div id="status" class="meta"></div>
  </div>

  <script src="script.js">
  </script>
</body>
</html>
