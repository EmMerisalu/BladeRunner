<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Lobby</title>
<link rel="stylesheet" href="style.css" />
<style>
  .error-message {
    color: #ff6b6b;
    font-size: 13px;
    margin-top: 4px;
    min-height: 18px;
  }
</style>
</head>

<body>

<div class="box">

<h1>Game Lobby</h1>

<div class="meta">
Lobby ID: <span id="lobbyId">-</span>
<button id="copyId">Copy</button>
</div>

<div class="name-row">
  <input id="nameInput" type="text" placeholder="Enter your name..." maxlength="16">
  <div id="nameError" class="error-message"></div>
</div>

<div id="players" class="players"></div>

<div class="name-row">
  <label for="modeSelect">Mode</label>
  <select id="modeSelect" disabled>
    <option value="easy">Easy</option>
    <option value="hard">Hard</option>
  </select>
</div>

<div class="controls">
  <button id="readyBtn" disabled>Ready</button>
  <button id="startBtn" style="display:none">Start Game</button>
</div>

<div id="status" class="meta"></div>

</div>

<script>

(function(){

const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';

// Read lobbyId + pid
const params = new URLSearchParams(location.search);
const lobbyId = params.get('lobby');
const pidFromUrl = params.get('pid');

// Restore pid if page refreshed
const storedPid = sessionStorage.getItem('playerId');
if (!pidFromUrl && storedPid && lobbyId) {
  window.location.href = `/lobby?lobby=${encodeURIComponent(lobbyId)}&pid=${storedPid}`;
  return;
}

const ws = new WebSocket(`${protocol}//${location.host}${location.search}`);

const playersEl = document.getElementById('players');
const readyBtn = document.getElementById('readyBtn');
const startBtn = document.getElementById('startBtn');
const lobbyIdEl = document.getElementById('lobbyId');
const copyBtn = document.getElementById('copyId');
const status = document.getElementById('status');
const nameInput = document.getElementById('nameInput');
const nameError = document.getElementById('nameError');
const modeSelect = document.getElementById('modeSelect');

let myId = null;
let myName = null;
let nameUpdateTimeout = null;
let gameMounted = false;

lobbyIdEl.textContent = lobbyId || "-";

copyBtn.onclick = () => {
  navigator.clipboard.writeText(lobbyId);
  status.textContent = "Lobby ID copied";
};

function sendName(name){
  if(!name.trim()) return;
  const trimmed = name.trim();
  ws.send(JSON.stringify({type:"setName",name:trimmed}));
  sessionStorage.setItem('playerName', trimmed);
}

nameInput.addEventListener("input",()=>{

  const newName = nameInput.value.trim();

  if(newName === myName) return;

  if(nameUpdateTimeout) clearTimeout(nameUpdateTimeout);

  if(newName === ""){
    readyBtn.disabled = true;
    nameError.textContent = "";
    return;
  }

  nameUpdateTimeout = setTimeout(()=>sendName(newName),300);

});

nameInput.addEventListener("blur",()=>{

  const newName = nameInput.value.trim();

  if(newName && newName !== myName){
    if(nameUpdateTimeout) clearTimeout(nameUpdateTimeout);
    sendName(newName);
  }

});

ws.onopen = () => {

  status.textContent = "Connected";

  const saved = sessionStorage.getItem('playerName');

  if(saved){
    nameInput.value = saved;
    sendName(saved);
  }

};

ws.onclose = () => {
  status.textContent = "Disconnected";
};

ws.onmessage = (ev)=>{

const msg = JSON.parse(ev.data);

if(msg.type === "welcome"){
  myId = msg.id;
  sessionStorage.setItem('playerId', String(myId));
  if(msg.isHost){
    startBtn.style.display = "inline";
  }
}

if(msg.type === "lobby"){

  renderPlayers(msg.players,msg.hostId);
  if (msg.mode) modeSelect.value = msg.mode;

  if(myId === msg.hostId){
    // show start button when this client becomes host
    startBtn.style.display = "inline";
    modeSelect.disabled = false;
    const allReady =
      msg.players.length >= 1 &&
      msg.players.every(p => p.ready && p.name);

    startBtn.disabled = !allReady;
  } else {
    // hide if not host
    startBtn.style.display = "none";
    modeSelect.disabled = true;
  }

}

if(msg.type === "hostChanged"){
  // explicit leader update; adjust visibility
  if(myId === msg.hostId){
    startBtn.style.display = "inline";
    modeSelect.disabled = false;
  } else {
    startBtn.style.display = "none";
    modeSelect.disabled = true;
  }
}

if(msg.type === "nameTaken"){
  nameError.textContent = "Name already taken";
  readyBtn.disabled = true;
  myName = null;
}

if(msg.type === "start"){
  mountGameView();
}

};

function mountGameView() {
  if (gameMounted) return;
  gameMounted = true;

  if (!lobbyId || !myId) {
    status.textContent = 'Unable to start game';
    gameMounted = false;
    return;
  }

  sessionStorage.setItem('playerId', String(myId));

  const currentSocket = ws;

  document.title = 'BladeRunner';

  // Remove lobby page stylesheet so game visuals match /game page rendering.
  document.querySelectorAll('link[rel="stylesheet"]').forEach((linkEl) => linkEl.remove());

  document.body.className = '';
  document.body.removeAttribute('style');

  const gameBaseStyleId = 'game-base-style';
  if (!document.getElementById(gameBaseStyleId)) {
    const gameBaseStyle = document.createElement('style');
    gameBaseStyle.id = gameBaseStyleId;
    gameBaseStyle.textContent = 'body { margin: 0; background: #111; color: white; font-family: sans-serif; } #game { display: none; position: fixed; inset: 0; }';
    document.head.appendChild(gameBaseStyle);
  }

  document.body.innerHTML = `
    <div id="game" style="display:block; position:fixed; inset:0;">
      <div id="ui">
        <div id="timer">Loading game...</div>
      </div>
      <div id="gameArea">
        <div id="trackLines"></div>
      </div>
    </div>
  `;

  const gameCssId = 'game-style-link';
  if (!document.getElementById(gameCssId)) {
    const gameCss = document.createElement('link');
    gameCss.id = gameCssId;
    gameCss.rel = 'stylesheet';
    gameCss.href = '/game/style.css';
    document.head.appendChild(gameCss);
  }

  window.__bladeRunnerSocket = currentSocket;
  window.__bladeRunnerMyId = Number(sessionStorage.getItem('playerId')) || myId;

  const script = document.createElement('script');
  script.src = '/game/game.js';
  script.onload = () => {
    let initialized = false;

    const beginGame = () => {
      if (initialized) return;
      initialized = true;
      document.getElementById('game').style.display = 'block';
      if (typeof initGame === 'function') {
        initGame();
      }
    };

    currentSocket.onclose = () => {
      const timerEl = document.getElementById('timer');
      if (timerEl) {
        timerEl.textContent = 'Disconnected. Please refresh.';
      }
    };

    currentSocket.onmessage = (event) => {
      const gameMsg = JSON.parse(event.data);
      if (typeof handleServerMessage === 'function') {
        handleServerMessage(gameMsg);
      }

      if (gameMsg.type === 'rejected') {
        const timerEl = document.getElementById('timer');
        if (timerEl) {
          timerEl.textContent = gameMsg.reason || 'Rejected';
        }
        return;
      }

      if (gameMsg.type === 'started') {
        beginGame();
      }
    };

    beginGame();
  };

  script.onerror = () => {
    const timerEl = document.getElementById('timer');
    if (timerEl) {
      timerEl.textContent = 'Failed to load game assets.';
    }
  };

  document.body.appendChild(script);
}

function renderPlayers(players,hostId){

const me = players.find(p => p.id === myId);

if(me){
  readyBtn.disabled = !me.name;
  myName = me.name;
  if(me.name) {
    nameError.textContent = "";
    // Ensure name is saved to sessionStorage
    sessionStorage.setItem('playerName', me.name);
  }
}else{
  readyBtn.disabled = true;
}

playersEl.innerHTML = players.map(p=>{

const readyIcon = p.ready ? "🟢" : "⚪";
const crown = p.id === hostId ? "👑" : "";

return `
<div class="player">
<div class="avatar ${p.ready ? "ready" : ""}">🎮</div>
<span class="status">${readyIcon}</span>
<span class="name">${p.name || "(unnamed)"}</span>
<span class="host">${crown}</span>
</div>
`;

}).join("");

}

readyBtn.onclick = ()=>{
ws.send(JSON.stringify({type:"ready"}));
};

startBtn.onclick = ()=>{
ws.send(JSON.stringify({type:"startGame"}));
};

modeSelect.onchange = ()=>{
  ws.send(JSON.stringify({ type: "setGameMode", mode: modeSelect.value }));
};

})();

</script>

</body>
</html>
